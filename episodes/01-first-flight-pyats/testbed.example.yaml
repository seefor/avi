# This file is a safe example testbed for Episode 1.
# Copy it to testbed.yaml, then edit the copied file for your lab.
#
# The real testbed.yaml is ignored by Git because it may contain credentials.
# Do not paste running-config password values into this file. pyATS needs the
# actual SSH username/password you use to access the sandbox.

testbed:
  name: avi_episode_01_cat9k_lab

devices:
  Cat9k_AO_Sandbox:
    # The operating system tells pyATS/Unicon what kind of device to expect.
    os: iosxe

    # The device type is a friendly label for this lab device.
    type: switch

    # Credentials used for SSH login and enable mode.
    # Replace these placeholders in your local testbed.yaml.
    credentials:
      default:
        username: admin
        password: "<your-sandbox-password>"
      enable:
        password: "<your-enable-password>"

    connections:
      cli:
        # Episode 1 uses SSH through pyATS/Unicon.
        protocol: ssh

        # Management IP from the lab Cat9k sandbox.
        ip: 10.10.20.66

        # Standard SSH port.
        port: 22
